<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aetheric Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#060606;overflow:hidden;cursor:none}

/* noise grain */
.noise{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px}

/* custom cursor */
#cursor-dot{position:fixed;width:5px;height:5px;background:#fff;border-radius:50%;pointer-events:none;z-index:9000;transform:translate(-50%,-50%)}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(255,255,255,.22);border-radius:50%;pointer-events:none;z-index:8999;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s,background .3s}

/* enter overlay */
#enter-overlay{
  position:fixed;inset:0;z-index:8000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;
  background:#060606;
  transition:opacity 1s ease,visibility 1s ease
}
#enter-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
#enter-overlay h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,6vw,4.5rem);color:#e8e8e8;font-weight:400;letter-spacing:.04em}
#enter-overlay p{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.3em;color:#555;text-transform:uppercase;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}

/* canvas fills screen */
#sphere-canvas{position:fixed;inset:0;width:100%!important;height:100%!important;display:block}

/* sound button */
#sound-btn{
  position:fixed;bottom:1.75rem;right:1.75rem;z-index:7000;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
  color:#555;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.15em;
  padding:.45rem .8rem;cursor:none;text-transform:uppercase;
  transition:border-color .3s,color .3s
}
#sound-btn:hover{border-color:#4de8c2;color:#4de8c2}

/* tagline bottom center, fades in */
#tagline{
  position:fixed;bottom:2.2rem;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.22em;
  color:rgba(255,255,255,.2);text-transform:uppercase;
  opacity:0;transition:opacity 2s ease;pointer-events:none;z-index:7000;white-space:nowrap
}
#tagline.visible{opacity:1}
</style>
</head>
<body>

<div class="noise"></div>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div id="enter-overlay">
  <h1>Aetheric Lab</h1>
  <p>tap to enter</p>
</div>

<canvas id="sphere-canvas"></canvas>
<p id="tagline">We build things that shouldn't exist yet.</p>
<button id="sound-btn">[ sound off ]</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<script>
// ─── CURSOR ───────────────────────────────────────────────────────────────────
const cursorDot  = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function loopCursor(){
  cursorDot.style.left=mx+'px'; cursorDot.style.top=my+'px';
  rx+=(mx-rx)*.1; ry+=(my-ry)*.1;
  cursorRing.style.left=rx+'px'; cursorRing.style.top=ry+'px';
  requestAnimationFrame(loopCursor);
})();
document.querySelectorAll('button,a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cursorRing.style.width='56px';cursorRing.style.height='56px';cursorRing.style.borderColor='rgba(77,232,194,.45)';cursorRing.style.background='rgba(77,232,194,.04)'});
  el.addEventListener('mouseleave',()=>{cursorRing.style.width='36px';cursorRing.style.height='36px';cursorRing.style.borderColor='rgba(255,255,255,.22)';cursorRing.style.background='transparent'});
});

// ─── ENTER OVERLAY ────────────────────────────────────────────────────────────
let audioStarted = false;
const overlay = document.getElementById('enter-overlay');
overlay.addEventListener('click', ()=>{
  overlay.classList.add('hidden');
  startAudio();
  audioStarted = true;
  setTimeout(()=>{ document.getElementById('tagline').classList.add('visible'); }, 800);
}, {once:true});

// ─── THREE.JS SPHERE ──────────────────────────────────────────────────────────
const sCanvas = document.getElementById('sphere-canvas');
const renderer = new THREE.WebGLRenderer({canvas:sCanvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene  = new THREE.Scene();
// Square aspect camera so sphere looks round
const W = Math.min(window.innerWidth, window.innerHeight);
const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 3.4;

// ── Fibonacci dots ────────────────────────────────────────────────────────────
const N_DOTS = 600;
const golden = Math.PI*(3-Math.sqrt(5));
const dotGeo = new THREE.SphereGeometry(.018, 7, 7);
const dotMats   = [];
const dots      = [];
const dotPositions = [];   // local positions (unit sphere)

for(let i=0;i<N_DOTS;i++){
  const y     = 1-(i/(N_DOTS-1))*2;
  const r     = Math.sqrt(1-y*y);
  const theta = golden*i;
  const x     = Math.cos(theta)*r;
  const z     = Math.sin(theta)*r;

  const mat  = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:.13});
  const mesh = new THREE.Mesh(dotGeo, mat);
  mesh.position.set(x, y, z);

  dots.push(mesh);
  dotMats.push(mat);
  dotPositions.push(new THREE.Vector3(x, y, z));
}

const sphereGroup = new THREE.Group();
dots.forEach(d=>sphereGroup.add(d));
scene.add(sphereGroup);

// invisible hit-sphere for raycasting
const hitSphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.08, 32, 32),
  new THREE.MeshBasicMaterial({visible:false, side:THREE.FrontSide})
);
sphereGroup.add(hitSphere);

// ── Interaction state ─────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
let sMouseX=0, sMouseY=0, sphereHover=false;

sCanvas.addEventListener('mousemove', e=>{
  const r = sCanvas.getBoundingClientRect();
  sMouseX = ((e.clientX-r.left)/r.width )*2-1;
  sMouseY =-((e.clientY-r.top) /r.height)*2+1;
  sphereHover = true;
});
sCanvas.addEventListener('mouseleave', ()=>{ sphereHover=false; });

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
(function loopSphere(){
  requestAnimationFrame(loopSphere);
  const t = clock.getElapsedTime();

  sphereGroup.rotation.y += sphereHover ? .007 : .003;
  sphereGroup.rotation.x += .0005;

  if(sphereHover){
    raycaster.setFromCamera({x:sMouseX, y:sMouseY}, camera);
    const hits = raycaster.intersectObject(hitSphere);
    if(hits.length>0){
      const hp = hits[0].point.clone();
      sphereGroup.worldToLocal(hp);

      dotPositions.forEach((pos,i)=>{
        const dist = pos.distanceTo(hp);
        const br   = Math.max(.08, 1-dist*2.2);
        dotMats[i].opacity = br;
        if(br>.5)       dotMats[i].color.set(0x4de8c2);
        else if(br>.2)  dotMats[i].color.set(0xa0f0e0);
        else            dotMats[i].color.set(0xffffff);
      });

      if(audioStarted && Math.random()<.06) playSphereNote(hp.y);
    }
  } else {
    dotMats.forEach((m,i)=>{
      const wave = Math.sin(t*.8 + dotPositions[i].y*2 + dotPositions[i].x)*.05;
      m.opacity = .1 + wave;
      m.color.set(0xffffff);
    });
  }

  renderer.render(scene, camera);
})();

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// ─── SOUND ENGINE ─────────────────────────────────────────────────────────────
let drone, bowl, pingPoly;
let soundOn = false;
const soundBtn = document.getElementById('sound-btn');

function startAudio(){
  if(typeof Tone==='undefined') return;
  Tone.start();

  const rev6 = new Tone.Reverb({decay:6,wet:.7}).toDestination();
  const lim  = new Tone.Limiter(-6).connect(rev6);

  // ambient drone 36 Hz + fifth
  drone = new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'sine'},
    envelope:{attack:4,decay:0,sustain:1,release:8},
    volume:-28
  }).connect(new Tone.AutoFilter({frequency:.08,depth:.3}).start()).connect(rev6);
  drone.triggerAttack(['C1','G1','C2']);

  // singing bowl for cursor
  bowl = new Tone.Synth({
    oscillator:{type:'triangle'},
    envelope:{attack:.4,decay:0,sustain:1,release:1.5},
    volume:-22
  }).connect(new Tone.Chorus({frequency:1.5,delayTime:3.5,depth:.7}).start())
    .connect(new Tone.Reverb({decay:5,wet:.8}).toDestination());

  // dot pings
  pingPoly = new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'sine'},
    envelope:{attack:.001,decay:.15,sustain:0,release:.3},
    volume:-32
  }).connect(new Tone.Reverb({decay:2,wet:.6}).toDestination());

  soundOn = true;
  soundBtn.textContent='[ sound on ]';
}

let lastBowlFreq=-1;
function playSphereNote(yPos){
  if(!soundOn||!bowl) return;
  const freq = 55*Math.pow(2,(yPos+1)*1.5);
  if(Math.abs(freq-lastBowlFreq)>5){
    bowl.frequency.rampTo(freq,.08);
    try{ if(!bowl._started){bowl.triggerAttack(freq);bowl._started=true;} }catch(e){}
    lastBowlFreq=freq;
  }
  const pf=[220,330,440,550,660,880];
  try{ pingPoly.triggerAttackRelease(pf[Math.floor(Math.random()*pf.length)]+Math.random()*15,'16n'); }catch(e){}
}

soundBtn.addEventListener('click',()=>{
  if(!audioStarted){ startAudio(); audioStarted=true; return; }
  soundOn=!soundOn;
  soundBtn.textContent=soundOn?'[ sound on ]':'[ sound off ]';
  Tone.getDestination().volume.rampTo(soundOn?0:-80,.5);
});
</script>
</body>
</html>
