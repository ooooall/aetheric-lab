<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#060606"/>
<title>Aetheric Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{width:100%;height:100%;min-height:100vh;min-height:-webkit-fill-available;background:#060606;overflow:hidden;cursor:none;-webkit-tap-highlight-color:transparent}

/* noise grain */
.noise{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px}

/* custom cursor */
#cursor-dot{position:fixed;width:5px;height:5px;background:#fff;border-radius:50%;pointer-events:none;z-index:9000;transform:translate(-50%,-50%)}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(255,255,255,.22);border-radius:50%;pointer-events:none;z-index:8999;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s,background .3s}

/* enter overlay */
#enter-overlay{
  position:fixed;inset:0;z-index:8000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;
  background:#060606;
  transition:opacity 1.2s cubic-bezier(.25,.1,.25,1), visibility 1.2s, transform 1.2s cubic-bezier(.25,.1,.25,1);
  touch-action:manipulation
}
#enter-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none;transform:scale(0.88)}
#enter-overlay h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,6vw,4.5rem);color:#e8e8e8;font-weight:400;letter-spacing:.04em}
#enter-overlay p{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.3em;color:#555;text-transform:uppercase;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}

/* canvas fills screen */
#sphere-canvas{position:fixed;inset:0;width:100%!important;height:100%!important;display:block}

/* sound button */
#sound-btn{
  position:fixed;bottom:1.75rem;right:1.75rem;z-index:7000;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
  color:#555;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.15em;
  padding:.45rem .8rem;cursor:none;text-transform:uppercase;
  transition:border-color .3s,color .3s;touch-action:manipulation
}
#sound-btn:hover{border-color:#4de8c2;color:#4de8c2}

/* tagline bottom center, fades in */
#tagline{
  position:fixed;bottom:2.2rem;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.22em;
  color:rgba(255,255,255,.2);text-transform:uppercase;
  opacity:0;transition:opacity 2s ease;pointer-events:none;z-index:7000;white-space:nowrap
}
#tagline.visible{opacity:1}

/* ─── MOBILE ───────────────────────────────────────────────────────────────── */
@media (max-width:768px),(hover:none){
  html,body{cursor:default}
  #cursor-dot,#cursor-ring{display:none!important}
  #enter-overlay{gap:1.2rem;padding:1rem}
  #enter-overlay h1{font-size:clamp(1.75rem,8vw,3rem)}
  #enter-overlay p{font-size:.65rem;letter-spacing:.25em}
  #sound-btn{
    bottom:max(1rem,env(safe-area-inset-bottom));
    right:max(1rem,env(safe-area-inset-right));
    padding:.6rem 1rem;min-height:44px;min-width:44px;
    font-size:.6rem;cursor:pointer
  }
  #tagline{
    bottom:max(1.5rem,calc(1rem + env(safe-area-inset-bottom)));
    font-size:.58rem;letter-spacing:.18em;
    white-space:normal;text-align:center;max-width:90%;padding:0 1rem
  }
}
@media (max-width:480px){
  #enter-overlay h1{font-size:1.6rem}
  #tagline{font-size:.52rem}
}
</style>
</head>
<body>

<div class="noise"></div>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div id="enter-overlay">
  <h1>Aetheric Lab</h1>
  <p>tap to enter</p>
</div>

<canvas id="sphere-canvas"></canvas>
<p id="tagline">We build things that shouldn't exist yet.</p>
<button id="sound-btn">[ sound off ]</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<script>
// ─── CURSOR ───────────────────────────────────────────────────────────────────
const cursorDot  = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function loopCursor(){
  cursorDot.style.left=mx+'px'; cursorDot.style.top=my+'px';
  rx+=(mx-rx)*.1; ry+=(my-ry)*.1;
  cursorRing.style.left=rx+'px'; cursorRing.style.top=ry+'px';
  requestAnimationFrame(loopCursor);
})();
document.querySelectorAll('button,a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cursorRing.style.width='56px';cursorRing.style.height='56px';cursorRing.style.borderColor='rgba(77,232,194,.45)';cursorRing.style.background='rgba(77,232,194,.04)'});
  el.addEventListener('mouseleave',()=>{cursorRing.style.width='36px';cursorRing.style.height='36px';cursorRing.style.borderColor='rgba(255,255,255,.22)';cursorRing.style.background='transparent'});
});

// ─── ENTER OVERLAY ────────────────────────────────────────────────────────────
let audioStarted = false;
const overlay = document.getElementById('enter-overlay');
overlay.addEventListener('click', ()=>{
  if(overlay.classList.contains('hidden')) return;
  overlay.classList.add('hidden');
  startAudio();
  audioStarted = true;
  setTimeout(()=>{ document.getElementById('tagline').classList.add('visible'); }, 800);
  if(typeof resetCameraZoom === 'function') resetCameraZoom();
});

// ─── THREE.JS SPHERE ──────────────────────────────────────────────────────────
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);
const sCanvas = document.getElementById('sphere-canvas');
const renderer = new THREE.WebGLRenderer({canvas:sCanvas, antialias:true, alpha:true});
renderer.setPixelRatio(isMobile ? Math.min(window.devicePixelRatio,1.5) : Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 3.4;

// ── Fibonacci dots ────────────────────────────────────────────────────────────
const N_DOTS = isMobile ? 1400 : 2800;
const golden = Math.PI*(3-Math.sqrt(5));
const dotGeo = new THREE.SphereGeometry(.0095, 6, 6);
const dotMats   = [];
const dots      = [];
const dotPositions = [];   // local positions (unit sphere)

for(let i=0;i<N_DOTS;i++){
  const y     = 1-(i/(N_DOTS-1))*2;
  const r     = Math.sqrt(1-y*y);
  const theta = golden*i;
  const x     = Math.cos(theta)*r;
  const z     = Math.sin(theta)*r;

  const mat  = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:.13});
  const mesh = new THREE.Mesh(dotGeo, mat);
  mesh.position.set(x, y, z);

  dots.push(mesh);
  dotMats.push(mat);
  dotPositions.push(new THREE.Vector3(x, y, z));
}

const sphereGroup = new THREE.Group();
dots.forEach(d=>sphereGroup.add(d));
scene.add(sphereGroup);

// invisible hit-sphere for raycasting
const hitSphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.08, 32, 32),
  new THREE.MeshBasicMaterial({visible:false, side:THREE.FrontSide})
);
sphereGroup.add(hitSphere);

// ── Interaction state ─────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse2D = new THREE.Vector2();
let sMouseX=0, sMouseY=0, sphereHover=false;

// Camera zoom + overlay reveal state
let zoomPhase = 'idle';  // idle | zooming
let zoomStartTime = 0;
const CAM_Z_START = 3.4;
const CAM_Z_END = 0.82;
const ZOOM_DUR = 1.1;

function updateMouseFromEvent(e){
  const r = sCanvas.getBoundingClientRect();
  const x = e.clientX ?? e.touches?.[0]?.clientX;
  const y = e.clientY ?? e.touches?.[0]?.clientY;
  if(x!=null && y!=null){
    sMouseX = ((x-r.left)/r.width )*2-1;
    sMouseY =-((y-r.top) /r.height)*2+1;
    sphereHover = true;
  }
}
sCanvas.addEventListener('mousemove', updateMouseFromEvent);
sCanvas.addEventListener('mouseleave', ()=>{ sphereHover=false; });
sCanvas.addEventListener('touchmove', updateMouseFromEvent, {passive:true});
sCanvas.addEventListener('touchend', ()=>{ sphereHover=false; });
sCanvas.addEventListener('touchcancel', ()=>{ sphereHover=false; });

function trySphereClick(){
  if(zoomPhase !== 'idle') return;
  mouse2D.set(sMouseX, sMouseY);
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObject(hitSphere);
  if(hits.length === 0) return;

  zoomPhase = 'zooming';
  zoomStartTime = clock.getElapsedTime();
  if(audioStarted) playExplodeSound();
}

function resetCameraZoom(){
  camera.position.z = CAM_Z_START;
}
sCanvas.addEventListener('click', trySphereClick);
sCanvas.addEventListener('touchstart', e=>{
  if(e.touches.length) {
    const r = sCanvas.getBoundingClientRect();
    sMouseX = ((e.touches[0].clientX-r.left)/r.width )*2-1;
    sMouseY =-((e.touches[0].clientY-r.top) /r.height)*2+1;
    trySphereClick();
  }
}, {passive:true});

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
(function loopSphere(){
  requestAnimationFrame(loopSphere);
  const t = clock.getElapsedTime();

  sphereGroup.rotation.y += (sphereHover && zoomPhase === 'idle') ? .007 : .003;
  sphereGroup.rotation.x += .0005;

  // ── Camera zoom in → overlay reveal (same animation feel) ─────────────────────
  if(zoomPhase === 'zooming'){
    const elapsed = t - zoomStartTime;
    const p = Math.min(1, elapsed / ZOOM_DUR);
    const easeIn = p * p;  // ease-in: approach feel
    camera.position.z = CAM_Z_START + (CAM_Z_END - CAM_Z_START) * easeIn;
    if(p >= .5 && overlay.classList.contains('hidden')){
      document.getElementById('tagline').classList.remove('visible');
      overlay.classList.remove('hidden');
    }
    if(p >= 1){
      zoomPhase = 'idle';
      if(audioStarted) playReassembleSound();
    }
  } else if(sphereHover){
    raycaster.setFromCamera({x:sMouseX, y:sMouseY}, camera);
    const hits = raycaster.intersectObject(hitSphere);
    if(hits.length>0){
      const hp = hits[0].point.clone();
      sphereGroup.worldToLocal(hp);

      dotPositions.forEach((pos,i)=>{
        const dist = pos.distanceTo(hp);
        const br   = Math.max(.08, 1-dist*2.2);
        dotMats[i].opacity = br;
        if(br>.5)       dotMats[i].color.set(0x4de8c2);
        else if(br>.2)  dotMats[i].color.set(0xa0f0e0);
        else            dotMats[i].color.set(0xffffff);
      });

      if(audioStarted) playSphereNote(hp.y);
    }
  } else {
    dotMats.forEach((m,i)=>{
      const wave = Math.sin(t*.8 + dotPositions[i].y*2 + dotPositions[i].x)*.05;
      m.opacity = .1 + wave;
      m.color.set(0xffffff);
    });
  }

  renderer.render(scene, camera);
})();

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// ─── SOUND ENGINE ─────────────────────────────────────────────────────────────
let soundOn = false;
let masterOut, masterEQ, bowlSynth, dronePoly, shimmerLFO, cosmoPings, noiseLayer;
const soundBtn = document.getElementById('sound-btn');

function startAudio(){
  if(typeof Tone==='undefined') return;
  Tone.start();

  // ── master chain ──────────────────────────────────────────────────────
  masterOut = new Tone.Gain(1).toDestination();
  const masterLimiter = new Tone.Limiter(-2).connect(masterOut);
  masterEQ = new Tone.EQ3({low:4,mid:1,high:2}).connect(masterLimiter);

  // ── 1. DEEP SPACE DRONE — rich sub-bass with harmonics ───────────────
  const droneReverb = new Tone.Reverb({decay:16, wet:.88}).connect(masterEQ);
  const droneFilter = new Tone.AutoFilter({
    frequency:.08, type:'sine', depth:.6, baseFrequency:60, octaves:2
  }).start().connect(droneReverb);
  dronePoly = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity:2.5, modulationIndex:.8,
    oscillator:{type:'triangle'},
    modulation:{type:'sine'},
    envelope:{attack:4,decay:0,sustain:1,release:8},
    volume:-18
  }).connect(droneFilter);
  dronePoly.triggerAttack(['D1','F#1','A1','D2']);
  shimmerLFO = new Tone.LFO({frequency:.1, min:-24, max:-16}).start();
  shimmerLFO.connect(dronePoly.volume);

  // ── 2. COSMIC TEXTURE — warm metallic shimmer ────────────────────────
  const shimRev = new Tone.Reverb({decay:10, wet:.82}).connect(masterEQ);
  const shimDist = new Tone.Distortion(.12).connect(shimRev);
  const shimFilter = new Tone.Filter({type:'bandpass', frequency:2200, Q:3}).connect(shimDist);
  noiseLayer = new Tone.Noise('pink').connect(shimFilter);
  noiseLayer.volume.value = -34;
  noiseLayer.start();

  // ── 3. SINGING BOWL — warm metallic bell, cursor glide ────────────────
  const bowlRev = new Tone.Reverb({decay:8, wet:.82}).connect(masterEQ);
  const bowlChorus = new Tone.Chorus({frequency:1.2, delayTime:3.5, depth:.5}).start().connect(bowlRev);
  bowlSynth = new Tone.FMSynth({
    harmonicity:4.8,
    modulationIndex:2.8,
    oscillator:{type:'sine'},
    modulation:{type:'sine'},
    modulationEnvelope:{attack:.2,decay:.5,sustain:.6,release:2},
    envelope:{attack:.4, decay:0, sustain:1, release:2.2},
    volume:-14
  }).connect(bowlChorus);

  // ── 4. CRYSTAL PINGS — glassy bell chimes ─────────────────────────────
  const pingRev = new Tone.Reverb({decay:6, wet:.78}).connect(masterEQ);
  const pingDelay = new Tone.FeedbackDelay({delayTime:'8n', feedback:.28, wet:.22}).connect(pingRev);
  cosmoPings = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity:5.2,
    modulationIndex:2.4,
    oscillator:{type:'sine'},
    modulation:{type:'triangle'},
    modulationEnvelope:{attack:.001,decay:.22,sustain:0,release:.35},
    envelope:{attack:.001,decay:.18,sustain:0,release:.65},
    volume:-20
  }).connect(pingDelay);

  // ── 5. ACTIVATION SWEEP — cinematic rise ─────────────────────────────
  const sweepRev = new Tone.Reverb({decay:8, wet:.85}).connect(masterEQ);
  const sweep = new Tone.FMSynth({
    harmonicity:3, modulationIndex:1.2,
    envelope:{attack:.15, decay:2.5, sustain:0, release:3},
    volume:-10
  }).connect(sweepRev);
  const now = Tone.now();
  sweep.frequency.setValueAtTime(82, now);
  sweep.frequency.exponentialRampToValueAtTime(1047, now + 2.2);
  sweep.triggerAttack(82, now);

  soundOn = true;
  soundBtn.textContent='[ sound on ]';
}

// Pentagon scale in Hz — exotic, spacey intervals
const cosmoScale = [55, 61.7, 73.4, 82.4, 98, 110, 130.8, 146.8, 164.8, 196, 220, 261.6, 293.7, 329.6, 392, 440, 523, 587];
let lastBowlFreq = -1;
let lastPingTime = 0;

function playExplodeSound(){
  if(!soundOn || typeof Tone==='undefined') return;
  const dest = masterEQ || Tone.getDestination();
  const now = Tone.now();
  const rev = new Tone.Reverb({decay:3, wet:.85}).connect(dest);
  const noise = new Tone.Noise('brown').connect(rev);
  noise.volume.value = -12;
  noise.start(now);
  noise.stop(now + .4);
  const filter = new Tone.Filter({type:'lowpass', frequency:550}).connect(rev);
  const sweep = new Tone.FMSynth({
    harmonicity:2.5, modulationIndex:1.5,
    envelope:{attack:.001, decay:.35, sustain:0, release:.5},
    volume:-8
  }).connect(filter);
  sweep.frequency.setValueAtTime(220, now);
  sweep.frequency.exponentialRampToValueAtTime(45, now + .45);
  sweep.triggerAttackRelease(220, .5, now);
}

function playReassembleSound(){
  if(!soundOn || typeof Tone==='undefined') return;
  const dest = masterEQ || Tone.getDestination();
  const now = Tone.now();
  const rev = new Tone.Reverb({decay:5, wet:.82}).connect(dest);
  const fm = new Tone.FMSynth({
    harmonicity:4.2, modulationIndex:2.2,
    oscillator:{type:'sine'},
    modulation:{type:'sine'},
    envelope:{attack:.25, decay:0, sustain:1, release:1.8},
    volume:-12
  }).connect(rev);
  fm.frequency.setValueAtTime(130.8, now);
  fm.frequency.exponentialRampToValueAtTime(523.25, now + 1);
  fm.triggerAttack(130.8, now);
  fm.triggerRelease(now + 1.15);
  [.2, .45, .7, .95].forEach((delay,i)=>{
    const ping = new Tone.FMSynth({
      harmonicity:5.5, modulationIndex:2.2,
      oscillator:{type:'sine'},
      modulation:{type:'triangle'},
      envelope:{attack:.001, decay:.2, sustain:0, release:.55},
      volume:-16
    }).connect(rev);
    const chord = [261.6, 329.6, 392, 523.25];
    ping.triggerAttackRelease(chord[i], '8n', now + delay * .95);
  });
}

function playSphereNote(yPos){
  if(!soundOn) return;
  const now = Tone.now();

  // Singing bowl glide
  if(bowlSynth){
    // Map y (-1..1) to cosmoScale range
    const idx = Math.floor(((yPos+1)/2) * (cosmoScale.length-1));
    const freq = cosmoScale[Math.max(0, Math.min(cosmoScale.length-1, idx))];
    if(Math.abs(freq - lastBowlFreq) > 3){
      if(!bowlSynth._started){
        bowlSynth.triggerAttack(freq, now);
        bowlSynth._started = true;
      } else {
        bowlSynth.frequency.rampTo(freq, .12);
      }
      lastBowlFreq = freq;
    }
  }

  // Crystal pings — throttled to max 8 per second
  if(cosmoPings && now - lastPingTime > .125){
    const idx = Math.floor(Math.random() * cosmoScale.length);
    const f = cosmoScale[idx] * (Math.random() < .3 ? 2 : 1); // occasional octave jump
    try{ cosmoPings.triggerAttackRelease(f, '8n', now); }catch(e){}
    lastPingTime = now;
  }
}

soundBtn.addEventListener('click',()=>{
  if(!audioStarted){ startAudio(); audioStarted=true; return; }
  soundOn=!soundOn;
  soundBtn.textContent=soundOn?'[ sound on ]':'[ sound off ]';
  Tone.getDestination().volume.rampTo(soundOn?0:-80, .6);
});
</script>
</body>
</html>
